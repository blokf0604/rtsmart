<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Keuangan RT Pintar</title>
    
    <!-- Fonts: Fira Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Fira Sans"', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
                        surface: { light: '#ffffff', dark: '#1e293b' }
                    }
                }
            }
        }
    </script>

    <!-- Icons: Phosphor -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Chart.js & SheetJS (Excel) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <style>
        /* Custom Styles & Glassmorphism */
        body { -webkit-tap-highlight-color: transparent; }
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .dark .glass-nav {
            background: rgba(30, 41, 59, 0.85);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .dark .glass-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        .page-transition { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 40;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.5);
            transition: transform 0.2s;
        }
        .fab:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300 font-sans pb-24">

    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-primary-600 text-white shadow-md rounded-b-3xl">
        <div class="px-6 py-5 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold tracking-tight">RT-Smart<span class="text-blue-200">Finance</span></h1>
                <p class="text-xs text-blue-100 font-medium opacity-90" id="header-subtitle">Mengelola Keuangan Lebih Mudah</p>
            </div>
            <div class="flex gap-3">
                <button id="btn-sync" onclick="App.syncData()" class="p-2 rounded-full bg-white/20 hover:bg-white/30 backdrop-blur-sm transition">
                    <i class="ph ph-arrows-clockwise text-xl"></i>
                </button>
                <button onclick="App.toggleTheme()" class="p-2 rounded-full bg-white/20 hover:bg-white/30 backdrop-blur-sm transition">
                    <i class="ph ph-moon text-xl" id="theme-icon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- MAIN CONTAINER -->
    <main id="app-container" class="px-4 pt-6 max-w-3xl mx-auto">
        <!-- Views will be injected here -->
    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="fixed bottom-0 left-0 right-0 glass-nav z-50 pb-safe">
        <div class="max-w-md mx-auto flex justify-between items-center px-6 py-2">
            <button onclick="App.navigate('dashboard')" class="nav-item flex flex-col items-center p-2 text-primary-600 transition" data-target="dashboard">
                <i class="ph-fill ph-squares-four text-2xl mb-1"></i>
                <span class="text-[10px] font-semibold">Beranda</span>
            </button>
            <button onclick="App.navigate('warga')" class="nav-item flex flex-col items-center p-2 text-slate-400 hover:text-primary-500 transition" data-target="warga">
                <i class="ph ph-users text-2xl mb-1"></i>
                <span class="text-[10px] font-semibold">Warga</span>
            </button>
            <button onclick="App.navigate('iuran')" class="nav-item flex flex-col items-center p-2 text-slate-400 hover:text-primary-500 transition" data-target="iuran">
                <i class="ph ph-wallet text-2xl mb-1"></i>
                <span class="text-[10px] font-semibold">Iuran</span>
            </button>
            <button onclick="App.navigate('arisan')" class="nav-item flex flex-col items-center p-2 text-slate-400 hover:text-primary-500 transition" data-target="arisan">
                <i class="ph ph-gift text-2xl mb-1"></i>
                <span class="text-[10px] font-semibold">Arisan</span>
            </button>
            <button onclick="App.navigate('laporan')" class="nav-item flex flex-col items-center p-2 text-slate-400 hover:text-primary-500 transition" data-target="laporan">
                <i class="ph ph-chart-line-up text-2xl mb-1"></i>
                <span class="text-[10px] font-semibold">Laporan</span>
            </button>
        </div>
    </nav>

    <!-- TOAST NOTIFICATION -->
    <div id="toast-container" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- GLOBAL MODAL BACKDROP -->
    <div id="modal-backdrop" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[60] hidden opacity-0 transition-opacity duration-300"></div>
    <div id="modal-container" class="fixed inset-x-4 top-1/2 transform -translate-y-1/2 z-[70] hidden max-w-md mx-auto page-transition">
        <!-- Modal content injected dynamically -->
    </div>

    <!-- TEMPLATES FOR VIEWS -->
    
    <!-- 1. DASHBOARD VIEW -->
    <template id="tpl-dashboard">
        <div class="space-y-6">
            <!-- Saldo Utama -->
            <div class="bg-gradient-to-br from-primary-600 to-blue-800 rounded-3xl p-6 text-white shadow-lg relative overflow-hidden">
                <div class="absolute top-0 right-0 opacity-10 transform translate-x-1/4 -translate-y-1/4">
                    <i class="ph-fill ph-wallet text-9xl"></i>
                </div>
                <p class="text-sm font-medium text-blue-100 mb-1">Total Saldo Kas RT</p>
                <h2 class="text-4xl font-bold mb-4 tracking-tight" id="dash-saldo">Rp 0</h2>
                
                <div class="flex gap-4 border-t border-white/20 pt-4">
                    <div>
                        <p class="text-xs text-blue-200">Masuk (Bulan Ini)</p>
                        <p class="text-sm font-semibold flex items-center gap-1"><i class="ph ph-arrow-down-left text-green-300"></i> <span id="dash-masuk">Rp 0</span></p>
                    </div>
                    <div class="w-px bg-white/20"></div>
                    <div>
                        <p class="text-xs text-blue-200">Keluar (Bulan Ini)</p>

                    </div>

            <!-- Quick Actions -->
            <div class="grid grid-cols-4 gap-3">
                <button onclick="UI.showModal('modal-pemasukan')" class="flex flex-col items-center justify-center p-3 glass-card rounded-2xl shadow-sm hover:bg-primary-50 dark:hover:bg-slate-800 transition">
                    <div class="w-10 h-10 rounded-full bg-green-100 dark:bg-green-900/30 text-green-600 flex items-center justify-center mb-2"><i class="ph ph-download-simple text-xl"></i></div>
                    <span class="text-xs font-semibold">Masuk</span>
                </button>
                <button onclick="UI.showModal('modal-pengeluaran')" class="flex flex-col items-center justify-center p-3 glass-card rounded-2xl shadow-sm hover:bg-primary-50 dark:hover:bg-slate-800 transition">

                <button onclick="App.navigate('iuran')" class="flex flex-col items-center justify-center p-3 glass-card rounded-2xl shadow-sm hover:bg-primary-50 dark:hover:bg-slate-800 transition">

                    <span class="text-xs font-semibold">Iuran</span>

                <button onclick="App.navigate('arisan')" class="flex flex-col items-center justify-center p-3 glass-card rounded-2xl shadow-sm hover:bg-primary-50 dark:hover:bg-slate-800 transition">

            </div>

            <!-- Statistik Cards -->
            <h3 class="text-lg font-bold mt-6 mb-3">Statistik Warga</h3>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-blue-50 dark:bg-blue-900/20 text-primary-500 flex items-center justify-center text-2xl"><i class="ph-fill ph-users-three"></i></div>
                    <div><p class="text-2xl font-bold" id="stat-warga">0</p><p class="text-xs text-slate-500">Warga Aktif</p></div>
                </div>
                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-purple-50 dark:bg-purple-900/20 text-purple-500 flex items-center justify-center text-2xl"><i class="ph-fill ph-ticket"></i></div>
                    <div><p class="text-2xl font-bold" id="stat-slot">0</p><p class="text-xs text-slate-500">Slot Arisan</p></div>
                </div>
            </div>

            <!-- Chart -->
            <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 mt-4">
                <h3 class="text-sm font-bold mb-4">Grafik Kas 6 Bulan Terakhir</h3>
                <canvas id="dashboardChart" height="200"></canvas>
            </div>

    </template>

    <!-- 2. WARGA VIEW -->
    <template id="tpl-warga">
        <div class="space-y-4">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-xl font-bold">Data Warga</h2>
                <div class="relative">
                    <i class="ph ph-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="search-warga" onkeyup="Views.warga.filter()" placeholder="Cari nama..." class="pl-9 pr-4 py-2 text-sm bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-full focus:outline-none focus:ring-2 focus:ring-primary-500 w-40 transition-all focus:w-48">
                </div>
            </div>

            <div id="list-warga" class="space-y-3 pb-20">

            </div>

            <!-- FAB Add -->
            <button onclick="Views.warga.showForm()" class="fab bg-primary-600 text-white w-14 h-14 rounded-full flex items-center justify-center text-2xl hover:bg-primary-700">
                <i class="ph ph-plus"></i>
            </button>

    </template>

    <!-- 3. IURAN VIEW -->

        <div class="space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold">Iuran Wajib</h2>
                <div class="flex gap-2">
                    <select id="filter-bulan-iuran" onchange="Views.iuran.render()" class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm px-2 py-1">
                        <!-- Options injected JS -->
                    </select>
                </div>
            </div>

            <!-- Progress Card -->

                <div class="flex justify-between text-sm mb-2">

                <i class="ph ph-hand-coins"></i>

        </div>

    <!-- 4. ARISAN VIEW -->
    <template id="tpl-arisan">
        <div class="space-y-4">
            <h2 class="text-xl font-bold mb-2">Arisan RT</h2>
            
            <!-- Arisan Stats -->

                <div class="flex justify-between items-center mb-4">
                    <div>
                        <p class="text-xs text-purple-200">Total Terkumpul Bulan Ini</p>
                        <h3 class="text-2xl font-bold" id="arisan-terkumpul">Rp 0</h3>
                    </div>
                    <div class="text-right">

                    </div>
                </div>
                <button onclick="Views.arisan.showUndian()" class="w-full bg-white text-purple-700 py-2 rounded-xl font-bold text-sm shadow-sm hover:bg-slate-50 transition flex justify-center items-center gap-2">

            </div>

            <div class="flex justify-between items-center mt-6">
                <h3 class="font-bold">Pembayaran Arisan</h3>
                <select id="filter-bulan-arisan" onchange="Views.arisan.render()" class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm px-2 py-1">

                </select>
            </div>

            <div id="list-arisan" class="space-y-3 pb-20">

            </div>

            <button onclick="Views.arisan.showForm()" class="fab bg-purple-600 text-white w-14 h-14 rounded-full flex items-center justify-center text-2xl">

    <!-- 5. LAPORAN VIEW -->
    <template id="tpl-laporan">

            <h2 class="text-xl font-bold">Laporan Keuangan</h2>
            
            <div class="flex gap-2">

                <button class="flex-1 py-2 rounded-xl bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-700 text-sm font-semibold" onclick="Views.laporan.setFilter('Arisan')">Arisan</button>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <select id="lap-bulan" class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2 text-sm w-full" onchange="Views.laporan.render()"></select>
                <select id="lap-tahun" class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2 text-sm w-full" onchange="Views.laporan.render()"></select>
            </div>

            <!-- List Transaksi -->
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden">

                    <div class="flex gap-2">
                        <button onclick="Views.laporan.exportPDF()" class="text-red-500 hover:bg-red-50 p-1 rounded"><i class="ph ph-file-pdf text-xl"></i></button>
                        <button onclick="Views.laporan.exportExcel()" class="text-green-500 hover:bg-green-50 p-1 rounded"><i class="ph ph-file-xls text-xl"></i></button>
                    </div>
                </div>
                <div id="list-laporan" class="divide-y divide-slate-100 dark:divide-slate-700/50">
                    <!-- Injected JS -->
                </div>
                <div class="p-4 bg-slate-50 dark:bg-slate-800/50 flex justify-between font-bold text-sm">
                    <span>Sisa Saldo:</span>
                    <span id="lap-saldo" class="text-primary-600">Rp 0</span>
                </div>
            </div>
            <div class="pb-20"></div>
        </div>
    </template>

    <!-- CORE JAVASCRIPT -->
    <script>
        /**
         * ==========================================
         * CONFIGURATION & STATE MANAGEMENT
         * ==========================================
         */
        const AppConfig = {
            // Jika Anda sudah mendeploy GAS, masukkan URL-nya di sini
            // Contoh: "https://script.google.com/macros/s/AKfycby.../exec"
            GAS_URL: "https://script.google.com/macros/s/AKfycbwIsIZJZPipvjA_XcAwBleXXzXDjiBM5k7nTaVsa-D0JgLz1nv5B4sT6bnVXBlZ5bq0/exec", 
            useMockData: false // Otomatis true jika GAS_URL kosong
        };

        const State = {
            warga: [],
            keikutsertaan: [],
            iuran: [],
            arisan: [],
            pemasukan: [],
            pengeluaran: [],
            pemenang: [],
            pengaturan: { Nominal_Iuran: 50000, Nominal_Arisan: 100000 },
            currentView: 'dashboard',
            theme: 'light',
            months: ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember']
        };

        const Utils = {
            formatRp: (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka || 0),
            generateID: (prefix) => prefix + '-' + Date.now().toString().slice(-6) + Math.floor(Math.random()*100),
            getToday: () => new Date().toISOString().split('T')[0],
            getCurrentMonth: () => new Date().getMonth() + 1,
            getCurrentYear: () => new Date().getFullYear(),
            parseDate: (dateStr) => {
                if(!dateStr) return "-";
                let d = new Date(dateStr);
                return `${d.getDate()} ${State.months[d.getMonth()].slice(0,3)} ${d.getFullYear()}`;
            }
        };

        /**
         * ==========================================
         * API LAYER (Handles GAS Fetch / Mock)
         * ==========================================
         */
        const API = {
            async call(action, payload = null) {
                if (!AppConfig.GAS_URL || AppConfig.useMockData) {
                    return this.mockApi(action, payload);
                }
                
                try {
                    let url = `${AppConfig.GAS_URL}?action=${action}`;
                    let options = { method: 'GET' };
                    
                    if (payload) {
                        options = {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // GAS trick
                            body: JSON.stringify(payload)
                        };
                    }

                    UI.showLoading();
                    const res = await fetch(url, options);
                    const json = await res.json();
                    UI.hideLoading();
                    
                    if (json.status !== 'success') throw new Error(json.message);
                    return json.data;
                } catch (e) {
                    UI.hideLoading();
                    UI.toast("Koneksi gagal: " + e.message, "error");
                    console.error("API Error", e);
                    throw e;
                }
            },

            // Mock Local Storage untuk Preview
            mockApi(action, payload) {
                return new Promise((resolve) => {
                    setTimeout(() => {
                        let db = JSON.parse(localStorage.getItem('RTSmartDB')) || this.generateDummyData();
                        let result = null;

                        switch(action) {
                            case 'getData': result = db; break;
                            case 'addWarga':
                                db.warga.push(payload.warga);
                                db.keikutsertaan.push(payload.keikutsertaan);
                                result = payload; break;
                            case 'addPemasukan': db.pemasukan.push(payload); result = payload; break;
                            case 'addPengeluaran': db.pengeluaran.push(payload); result = payload; break;
                            case 'addIuran': db.iuran.push(payload); result = payload; break;
                            case 'addArisan': db.arisan.push(payload); result = payload; break;
                            case 'addPemenang': db.pemenang.push(payload); result = payload; break;
                        }
                        
                        localStorage.setItem('RTSmartDB', JSON.stringify(db));
                        resolve(result);
                    }, 500); // Simulate network delay
                });
            },

            generateDummyData() {
                let db = { warga: [], keikutsertaan: [], iuran: [], arisan: [], pemasukan: [], pengeluaran: [], pemenang: [], pengaturan: {Nominal_Iuran:50000, Nominal_Arisan:100000} };
                // Add 1 dummy data
                let id = Utils.generateID('WRG');
                db.warga.push({ ID_Warga: id, Nama: "Budi Santoso", Nomor_Rumah: "A1", No_HP: "08123456789", Status_Warga: "Aktif", Tanggal_Dibuat: Utils.getToday() });
                db.keikutsertaan.push({ ID: Utils.generateID('K'), ID_Warga: id, Ikut_Iuran_Wajib: "Ya", Ikut_Arisan: "Ya", Jumlah_Slot_Arisan: 2 });
                db.pemasukan.push({ ID: Utils.generateID('IN'), Tanggal: Utils.getToday(), Kategori: "Donasi", Nominal: 500000, Deskripsi: "Sumbangan awal tahun" });
                return db;
            }
        };

        /**
         * ==========================================
         * UI COMPONENTS & HELPERS
         * ==========================================
         */
        const UI = {
            toast(msg, type = "success") {
                const container = document.getElementById('toast-container');
                const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600' };
                const icons = { success: 'check-circle', error: 'warning-circle', info: 'info' };
                
                const el = document.createElement('div');
                el.className = `${colors[type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 text-sm font-medium transform transition-all duration-300 translate-y-[-20px] opacity-0`;
                el.innerHTML = `<i class="ph-fill ph-${icons[type]} text-xl"></i> <span>${msg}</span>`;
                
                container.appendChild(el);
                
                // Animate in
                setTimeout(() => { el.classList.remove('translate-y-[-20px]', 'opacity-0'); }, 10);
                
                // Remove
                setTimeout(() => {

                            </div>
                            <h2 class="font-bold text-2xl mb-2">Pengundian Arisan</h2>
                            <p class="text-sm text-slate-500 mb-6">Periode ${State.months[b-1]} ${y}</p>
                            <div id="gacha-box" class="h-16 flex items-center justify-center bg-slate-900 text-white rounded-xl text-xl font-bold mb-6 overflow-hidden">
                                ???
                            </div>
                            <button id="btn-undi" onclick="Views.arisan.jalankanUndian(${b}, ${y})" class="w-full py-3 bg-purple-600 text-white font-bold rounded-xl text-lg hover:bg-purple-700 shadow-lg">Mulai Acak!</button>
                        </div>
                    `;
                    UI.showModal(html);
                    window._gachaPool = gachaPool;
                },
                jalankanUndian(b, y) {
                    const btn = document.getElementById('btn-undi');
                    const box = document.getElementById('gacha-box');
                    btn.disabled = true;
                    btn.innerHTML = "Mengacak...";
                    
                    let pool = window._gachaPool;
                    let counter = 0;
                    let interval = setInterval(() => {
                        let randIndex = Math.floor(Math.random() * pool.length);
                        box.innerHTML = pool[randIndex].nama;
                        counter++;
                        if(counter > 20) {
                            clearInterval(interval);
                            let winner = pool[Math.floor(Math.random() * pool.length)];
                            box.innerHTML = `<span class="text-green-400">🎉 ${winner.nama} 🎉</span>`;
                            btn.innerHTML = "Simpan Pemenang";
                            btn.disabled = false;
                            
                            // Hitung total cair (total arisan terkumpul)
                            let totalCair = State.arisan.filter(x => x.Bulan == b && x.Tahun == y).reduce((s, x) => s + Number(x.Total), 0);

                            btn.onclick = () => Views.arisan.simpanPemenang(winner.id, b, y, winner.slots, totalCair);
                        }
                    }, 100);
                },
                async simpanPemenang(wID, b, y, slots, nominal) {
                    const payload = {
                        ID: Utils.generateID('WIN'),
                        Periode: `${b}-${y}`, Tanggal: Utils.getToday(), ID_Warga: wID,
                        Jumlah_Slot: slots, Nominal_Cair: nominal, Catatan: "Hasil Undian Sistem"
                    };
                    await API.call('addPemenang', payload);
                    State.pemenang.push(payload);
                    UI.closeModal();
                    UI.toast("Pemenang berhasil disimpan!");
                }
            },

            // --- LAPORAN ---
            laporan: {
                filterType: 'Kas', // Kas | Arisan
                setFilter(type) {
                    this.filterType = type;
                    document.getElementById('lap-title').innerText = `Buku ${type}`;
                    this.render();
                },
                setupFilters() {
                    const mSelect = document.getElementById('lap-bulan');
                    if(!mSelect.innerHTML) mSelect.innerHTML = `<option value="ALL">Semua Bulan</option>` + State.months.map((m, i) => `<option value="${i+1}" ${i+1 == Utils.getCurrentMonth() ? 'selected':''}>${m}</option>`).join('');
                    
                    const ySelect = document.getElementById('lap-tahun');
                    if(!ySelect.innerHTML) {
                        let cy = Utils.getCurrentYear();
                        ySelect.innerHTML = `<option value="${cy}">${cy}</option><option value="${cy-1}">${cy-1}</option>`;
                    }
                },
                render() {
                    this.setupFilters();
                    const b = document.getElementById('lap-bulan').value;
                    const y = document.getElementById('lap-tahun').value;
                    
                    let data = [];
                    let saldo = 0;

                    if(this.filterType === 'Kas') {
                        // Gabungkan Pemasukan, Pengeluaran, Iuran
                        let masuk = State.pemasukan.map(x => ({ tgl: x.Tanggal, ket: x.Kategori + " - " + x.Deskripsi, tipe: 'IN', nom: x.Nominal }));
                        let keluar = State.pengeluaran.map(x => ({ tgl: x.Tanggal, ket: x.Kategori + " - " + x.Deskripsi, tipe: 'OUT', nom: x.Nominal }));
                        let iuran = State.iuran.map(x => {
                            let w = State.warga.find(w=>w.ID_Warga==x.ID_Warga);
                            return { tgl: x.Tanggal, ket: `Iuran ${State.months[x.Bulan-1]} - ${w?.Nama}`, tipe: 'IN', nom: x.Nominal };
                        });
                        data = [...masuk, ...keluar, ...iuran];
                    } else {
                        // Arisan
                        let masuk = State.arisan.map(x => {
                            let w = State.warga.find(w=>w.ID_Warga==x.ID_Warga);
                            return { tgl: x.Tanggal, ket: `Setoran ${State.months[x.Bulan-1]} - ${w?.Nama}`, tipe: 'IN', nom: x.Total };
                        });
                        let keluar = State.pemenang.map(x => {
                            let w = State.warga.find(w=>w.ID_Warga==x.ID_Warga);
                            return { tgl: x.Tanggal, ket: `Pencairan ${x.Periode} - ${w?.Nama}`, tipe: 'OUT', nom: x.Nominal_Cair };
                        });
                        data = [...masuk, ...keluar];
                    }

                    // Filter Date
                    data = data.filter(d => {
                        let date = new Date(d.tgl);
                        let matchY = date.getFullYear() == y;
                        let matchB = b === "ALL" ? true : (date.getMonth() + 1 == b);
                        return matchY && matchB;
                    });

                    // Sort Date Asc
                    data.sort((a,b) => new Date(a.tgl) - new Date(b.tgl));

                    let html = '';
                    data.forEach(d => {
                        d.nom = Number(d.nom);
                        if(d.tipe === 'IN') saldo += d.nom; else saldo -= d.nom;
                        
                        let isOut = d.tipe === 'OUT';
                        html += `
                        <div class="p-4 flex justify-between items-center bg-white dark:bg-slate-800">
                            <div class="flex gap-3">
                                <div class="w-8 h-8 rounded-full ${isOut ? 'bg-red-50 text-red-500' : 'bg-green-50 text-green-500'} flex items-center justify-center">
                                    <i class="ph ${isOut ? 'ph-arrow-up-right' : 'ph-arrow-down-left'}"></i>
                                </div>
                                <div>
                                    <p class="text-xs text-slate-400">${Utils.parseDate(d.tgl)}</p>
                                    <p class="text-sm font-semibold max-w-[180px] truncate">${d.ket}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-sm font-bold ${isOut ? 'text-slate-800 dark:text-slate-200' : 'text-green-600'}">${isOut ? '-' : '+'}${Utils.formatRp(d.nom)}</p>
                            </div>
                        </div>`;
                    });

                    document.getElementById('list-laporan').innerHTML = html || `<div class="p-8 text-center text-slate-400 text-sm">Tidak ada transaksi</div>`;
                    document.getElementById('lap-saldo').innerText = Utils.formatRp(saldo);
                    window._currentReportData = data; // store for export
                },
                exportExcel() {
                    let data = window._currentReportData || [];
                    if(data.length===0) return UI.toast("Data kosong", "error");
                    
                    let exportData = data.map(d => ({
                        Tanggal: Utils.parseDate(d.tgl),
                        Keterangan: d.ket,
                        Pemasukan: d.tipe==='IN' ? d.nom : 0,
                        Pengeluaran: d.tipe==='OUT' ? d.nom : 0
                    }));
                    
                    const ws = XLSX.utils.json_to_sheet(exportData);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, "Laporan");
                    XLSX.writeFile(wb, `Laporan_${this.filterType}_${Date.now()}.xlsx`);
                },
                exportPDF() {
                    UI.toast("Fitur cetak dipanggil. Menyimpan PDF menggunakan fitur browser print.", "info");
                    window.print();
                    // Dalam implementasi nyata bisa menggunakan html2pdf.js
                }
            }
        };

        /**
         * ==========================================
         * MAIN APP ROUTER & BOOTSTRAP
         * ==========================================
         */
        const App = {
            async init() {
                // Theme setup
                if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.add('dark');
                    State.theme = 'dark';
                }
                this.updateThemeIcon();

                // Load Data
                await this.syncData();
                
                // Route to initial page
                this.navigate('dashboard');
            },

            async syncData() {
                try {
                    const data = await API.call('getData');
                    Object.assign(State, data); // Merge data to state
                    
                    // Re-render current view safely
                    if(Views[State.currentView] && Views[State.currentView].render) {
                        Views[State.currentView].render();
                    }
                } catch(e) {
                    UI.toast("Gagal sinkronisasi data", "error");
                }
            },

            navigate(viewId) {
                // 1. Update Navigation UI
                document.querySelectorAll('.nav-item').forEach(btn => {
                    const isActive = btn.dataset.target === viewId;
                    btn.classList.toggle('text-primary-600', isActive);
                    btn.classList.toggle('text-slate-400', !isActive);
                    btn.classList.toggle('dark:text-slate-500', !isActive);
                    
                    const icon = btn.querySelector('i');
                    if(isActive) {
                        icon.classList.remove('ph');
                        icon.classList.add('ph-fill');
                    } else {
                        icon.classList.remove('ph-fill');
                        icon.classList.add('ph');
                    }
                });

                // 2. Load Template
                const container = document.getElementById('app-container');
                const tpl = document.getElementById('tpl-' + viewId);
                
                if (tpl) {
                    container.innerHTML = `<div class="page-transition">${tpl.innerHTML}</div>`;
                    State.currentView = viewId;
                    
                    // 3. Trigger render logic
                    if(Views[viewId] && typeof Views[viewId].render === 'function') {
                        setTimeout(() => Views[viewId].render(), 50); // slight delay for DOM insertion
                    }
                }
            },

            toggleTheme() {
                if(State.theme === 'light') {
                    document.documentElement.classList.add('dark');
                    State.theme = 'dark';
                    localStorage.theme = 'dark';
                } else {
                    document.documentElement.classList.remove('dark');
                    State.theme = 'light';
                    localStorage.theme = 'light';
                }
                this.updateThemeIcon();
            },

            updateThemeIcon() {
                const icon = document.getElementById('theme-icon');
                if(State.theme === 'dark') {
                    icon.classList.replace('ph-moon', 'ph-sun');
                } else {
                    icon.classList.replace('ph-sun', 'ph-moon');
                }
            }
        };

        // Bootstrap the app
        document.addEventListener('DOMContentLoaded', () => {
            App.init();
        });

    </script>
</body>
</html>
